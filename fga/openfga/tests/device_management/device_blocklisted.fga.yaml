name: "Test device blacklisting"
model_file: "../../fga.mod"

tuples:
  - user: "tenant:test"
    relation: "tenant"
    object: "realm:test"
  # device:1 in realm test
  - user: "realm:test"
    relation: "realm"
    object: "device:1"
  # device:2 in realm test
  - user: "realm:test"
    relation: "realm"
    object: "device:2"
  - user: "user:alice"
    relation: "can_view_devices_in_all_realms"
    object: "tenant:test"
  - user: "user:alice"
    relation: "blocklisted"
    object: "device:2"

tests:
  - name: Device blacklist blocks user from accessing devices
    check:
      - user: "user:alice"
        object: "device:1"
        assertions:
          can_view: true
          can_edit_tags: false
          can_rename: false
          can_access_terminal: false
          can_identify: false
          can_delete: false
          can_update: false
      - user: "user:alice"
        object: "device:2"
        assertions:
          can_view: false
          can_edit_tags: false
          can_rename: false
          can_access_terminal: false
          can_identify: false
          can_delete: false
          can_update: false
