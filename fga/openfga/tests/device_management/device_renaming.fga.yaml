name: "Test device view"
model_file: "../../fga.mod"

tuples:
  - user: "tenant:test"
    relation: "tenant"
    object: "realm:test"
  - user: "realm:test"
    relation: "realm"
    object: "device:1"
  - user: "user:alice"
    relation: "can_rename"
    object: "device:1"
  - user: "user:bob"
    relation: "can_rename_devices"
    object: "realm:test"
  - user: "user:cindy"
    relation: "can_rename_devices_in_all_realms"
    object: "tenant:test"
  - user: "group:realm_renamers#member"
    relation: "can_rename_devices_in_all_realms"
    object: "tenant:test"
  - user: "user:daniel"
    relation: "member"
    object: "group:realm_renamers"

tests:
  - name: Device can be renamed by users with the correct property
    check:
      - user: "user:alice"
        object: "device:1"
        assertions:
          can_view: true
          can_edit_tags: false
          can_rename: true
          can_access_terminal: false
          can_identify: false
          can_delete: false
          can_update: false
      - user: "user:bob"
        object: "device:1"
        assertions:
          can_view: true
          can_edit_tags: false
          can_rename: true
          can_access_terminal: false
          can_identify: false
          can_delete: false
          can_update: false
      - user: "user:cindy"
        object: "device:1"
        assertions:
          can_view: true
          can_edit_tags: false
          can_rename: true
          can_access_terminal: false
          can_identify: false
          can_delete: false
          can_update: false
      - user: "user:daniel"
        object: "device:1"
        assertions:
          can_view: true
          can_edit_tags: false
          can_rename: true
          can_access_terminal: false
          can_identify: false
          can_delete: false
          can_update: false
