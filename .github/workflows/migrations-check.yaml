name: Migrations check

on:
  # Run on pull requests matching apps
  pull_request:
    paths:
      - "backend/priv/repo/migrations/**"
      - "backend/priv/resource_snapshots/**"
      - ".github/workflows/migrations-check.yaml"

jobs:
  comment:
    runs-on: ubuntu-latest
    secrets: inherit
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.EDGEHOG_APP_APP_ID }}
          private-key: ${{ secrets.EDGEHOG_APP_PRIVATE_KEY }}
      - name: Make license script executable
        run: chmod +x ./tools/check-migration-timestamps.sh
      - name: Run migrations check
        id: check-migrations
        shell: bash
        run: |
          echo "🔍 Checking migration and snapshot timestamps for this PR..."
          ./tools/check-migration-timestamps.sh \
                "${{ github.event.pull_request.base.sha }}" \
                "${{ github.event.pull_request.head.sha }}"
      - uses: mshick/add-pr-comment@v2
        if: ${{ steps.check-migrations.conclustion == 'failure'}}
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          message: |
            **⚠️ This PR changes migrations and/or snapshots**
            Ensure that the changes are based on the latest revision of the target branch before merging. Migrations and snapshots are timestamp-based and should chronologically follow the ones already merged.
