name: backend credo
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
    working-directory: backend
env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  credo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - uses: team-alembic/staple-actions/actions/mix-credo@8b0f5a1a7cadfbc86c2d00343d4a06a45352ef13 # main
        with:
          working-directory: backend
          mix-env: test
