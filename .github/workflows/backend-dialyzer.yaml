name: backend dialyzer
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
    working-directory: backend
env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  dialyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - name: Compute Dialyzer cache prefix
        id: dialyzer-cache-prefix
        run: |
          cache_prefix="dialyzer-$(awk '/^(erlang|elixir) / { print $2 }' ../.tool-versions | tr '\n' '-' | sed 's/-$//')"
          echo "prefix=$cache_prefix" >> "$GITHUB_OUTPUT"
      - uses: team-alembic/staple-actions/actions/mix-dialyzer@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          working-directory: backend
          mix-env: test
          cache-prefix: ${{ steps.dialyzer-cache-prefix.outputs.prefix }}
