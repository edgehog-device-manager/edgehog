name: Edgehog docs generation

# publish Generate and publish docs on pushes on main (or release branches) only
# when backend or frontend files are touched.
on:
  workflow_call:
    inputs:
      release-made:
        required: true
        type: boolean
      release-version:
        type: string
      publish:
        type: boolean
        default: true
    secrets:
      publish-key:
        required: true

defaults:
  run:
    shell: bash

jobs:
  docs:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout the source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: edgehog
          show-progress: false
          fetch-tags: true
      - name: Checkout the docs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: edgehog-device-manager/docs
          path: docs
          show-progress: false
          fetch-depth: 1
      - name: Checkout the interfaces repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: edgehog-device-manager/edgehog-astarte-interfaces
          path: edgehog-astarte-interfaces
          show-progress: false
          fetch-depth: 1
      - name: Compute docs version
        id: compute-version
        run: |
          echo "version=${{ inputs.release-made && inputs.release-version || 'snapshot' }}" >> "$GITHUB_OUTPUT"
      - uses: ./edgehog/.github/actions/doc-generate
        with:
          edgehog: edgehog
          docs: docs
          astarte-interfaces: edgehog-astarte-interfaces
          version: ${{ steps.compute-version.outputs.version }}

      - name: Commit files
        if: ${{ inputs.publish }}
        working-directory: docs
        run: |
          git config --local user.email "edgehog-machine@ispirata.com"
          git config --local user.name "Edgehog Bot"
          git add .
          git commit -m "Update Documentation"
      - name: Push changes
        if: ${{ inputs.publish }}
        working-directory: docs
        run: |
          eval `ssh-agent -t 300 -s`
          echo "${{ secrets.publish-key }}" | ssh-add -
          mkdir -p ~/.ssh/
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add topush "git@github.com:edgehog-device-manager/docs.git"
          git fetch topush
          git push topush main
