name: OpenFGA Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test-model:
    runs-on: ubuntu-latest
    services:
      openfga:
        image: openfga/openfga:v1.16.0
        command: run
        ports:
          - 8080:8080
          - 8081:8081
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install OpenFGA cli
        uses: jaxxstorm/action-install-gh-release@25d5e2dd555cd74f1fab9ac1e6ea117acde2c0c4 # v1.12.0
        with:
          repo: openfga/cli
          cache: enable
      - name: Validate OpenFGA model
        run: |
          fga model validate --file fga/openfga/fga.mod --format modular
      - uses: openfga/action-openfga-test@e89aa8259796cd5ee5c1b1ae7d72c401029cb947 # v0.1.2
        with:
          test_path: fga/openfga/tests
