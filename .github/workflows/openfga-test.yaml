name: OpenFGA Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test-model:
    runs-on: ubuntu-latest
    services:
      openfga:
        image: openfga/openfga:v1.15.1
        command: run
        ports:
          - 8080:8080
          - 8081:8081
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install OpenFGA cli
        uses: jaxxstorm/action-install-gh-release@v1.11.0
        with:
          repo: openfga/cli
          cache: enable
      - name: Validate OpenFGA model
        run: |
          fga model validate --file fga/openfga/fga.mod --format modular
      - uses: openfga/action-openfga-test@v0.1.1
        with:
          test_path: fga/openfga/tests
