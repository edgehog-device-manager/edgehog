name: backend openfga integration test
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  integration-openfga:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      openfga:
        image: openfga/openfga:v1.15.1
        command: run
        ports:
          - 8080:8080
          - 8081:8081
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
      - name: "Setup jq"
        uses: dcarbone/install-jq-action@b7ef57d46ece78760b4019dbc4080a1ba2a40b45 # v3
      - name: Install OpenFGA cli
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: openfga/cli
          cache: enable
      - name: Setup OpenFGA store
        id: store
        run: |
          fga store create --model ./fga/openfga/fga.mod --format modular > store_response.json
          cat store_response.json
          store_id=$(jq -r '.store.id' store_response.json)
          auth_model_id=$(jq -r '.model.authorization_model_id' store_response.json)
          echo "store_id=$store_id" >> $GITHUB_OUTPUT
          echo "auth_model_id=$auth_model_id" >> $GITHUB_OUTPUT
      - uses: team-alembic/staple-actions/actions/mix-task@6ea0d8a51c3c97a530d3c34cfb8ab9c15a1de4a1 # main
        with:
          mix-env: test
          working-directory: backend
          task: test --only integration_openfga
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          EDGEHOG_AUTHZ_PROVIDER: openfga
          EDGEHOG_OPENFGA_GRPC_ENDPOINT: "localhost:8081"
          EDGEHOG_OPENFGA_STORE_ID: ${{ steps.store.outputs.store_id }}
          EDGEHOG_OPENFGA_AUTH_MODEL_ID: ${{ steps.store.outputs.auth_model_id }}
