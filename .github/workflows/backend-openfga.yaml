name: backend openfga integration test
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
    working-directory: backend
env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  integration-openfga:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      openfga:
        image: openfga/openfga:v1.15.0
        ports:
          - 8080:8080
          - 8081:8081
    steps:
      - name: Store setup
        id: setup
        run: |
          wget https://github.com/openfga/cli/releases/download/v0.7.13/fga_0.7.13_linux_amd64.tar.gz -O fga.tar.gz
          tar -xzvf gfa.tar.gz
          chmod +x ./fga
          STORE_ID=$(./fga store create --model backend/priv/fga/model.fga --api-url "http://localhost:8080" | jq -r .store.id)
          echo "store-id=$STORE_ID" >> $GITHUB_OUTPUT
      - uses: team-alembic/staple-actions/actions/mix-task@41b1e46995448f976551fedad3ef6bf6ba7df873 # main
        with:
          mix-env: test
          working-directory: backend
          task: test --only integration_openfga
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          AUTHZ_PROVIDER: openfga
          OPENFGA_GRPC_ENDPOINT: "localhost:8081"
          OPENFGA_STORE_ID: ${{ steps.setup.outputs.store-id }}
